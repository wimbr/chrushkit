<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GSM STUDIOS ✦ CRUSHKIT</title>
    <script src="coi-serviceworker.js"></script>
    <style>
        body { background: #0e0e0e; color: #fff; font-family: 'Helvetica', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #drop-zone { width: 400px; height: 250px; border: 2px dashed #444; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; cursor: pointer; }
        #drop-zone:hover { border-color: #fff; background: #1a1a1a; }
        h1 { letter-spacing: 2px; font-weight: 200; }
        p { color: #666; font-size: 0.9rem; }
    </style>
</head>
<body>
    <h1>GSM STUDIOS | CRUSHKIT</h1>
    <div id="drop-zone" id="dropZone">
        <span>DRAG IMAGE TO CRUSH</span>
        <p>Resizes to 1920px ✦ Converts to WebP</p>
    </div>

    <script type="module">
        import { initializeImageMagick, ImageMagick, MagickFormat } from 'https://cdn.jsdelivr.net/npm/@imagemagick/magick-wasm@0.0.38/dist/index.mjs';

        const wasmUrl = 'https://cdn.jsdelivr.net/npm/@imagemagick/magick-wasm@0.0.38/dist/magick.wasm';

        await initializeImageMagick(wasmUrl);

        const zone = document.getElementById('drop-zone');

        zone.ondragover = (e) => { e.preventDefault(); };
        zone.ondrop = async (e) => {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            const arrayBuffer = await file.arrayBuffer();
            const data = new Uint8Array(arrayBuffer);

            ImageMagick.read(data, (image) => {
                image.resize(1920, 0); // Your magic 1920px rule
                image.write(MagickFormat.Webp, (outputBytes) => {
                    const blob = new Blob([outputBytes], { type: 'image/webp' });
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = `crushed_${file.name.split('.')[0]}.webp`;
                    link.click();
                });
            });
        };
    </script>
</body>
</html>
