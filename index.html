<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GSM STUDIOS ✦ CRUSHKIT</title>
    <script src="coi-serviceworker.js"></script>
    <style>
        body { background: #0e0e0e; color: #fff; font-family: 'Helvetica', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        #drop-zone { 
            width: 400px; height: 250px; border: 2px dashed #444; border-radius: 20px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: 0.3s; cursor: pointer; position: relative;
        }
        #drop-zone.ready { border-color: #00ff88; }
        #drop-zone.active { border-color: #fff; background: #1a1a1a; transform: scale(1.02); }
        h1 { letter-spacing: 2px; font-weight: 200; margin-bottom: 10px; }
        #status { font-size: 12px; color: #666; margin-top: 20px; text-transform: uppercase; letter-spacing: 1px; }
        p { color: #888; font-size: 0.9rem; margin-top: 5px; }
    </style>
</head>
<body>
    <h1>GSM STUDIOS | CRUSHKIT</h1>
    <div id="drop-zone">
        <span id="label">LOADING ENGINE...</span>
        <p>Resizes to 1920px ✦ WebP</p>
    </div>
    <div id="status">Waiting for ImageMagick...</div>

    <script type="module">
        import { initializeImageMagick, ImageMagick, MagickFormat } from 'https://cdn.jsdelivr.net/npm/@imagemagick/magick-wasm@0.0.38/dist/index.mjs';
        const wasmUrl = 'https://cdn.jsdelivr.net/npm/@imagemagick/magick-wasm@0.0.38/dist/magick.wasm';

        const zone = document.getElementById('drop-zone');
        const status = document.getElementById('status');
        const label = document.getElementById('label');

        // 1. Initialize and Update UI
        try {
            await initializeImageMagick(wasmUrl);
            zone.classList.add('ready');
            label.innerText = "READY TO CRUSH";
            status.innerText = "Engine Online";
        } catch (e) {
            status.innerText = "Error loading engine. Check console.";
            console.error(e);
        }

        // 2. Prevent browser from opening the file
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(name => {
            document.body.addEventListener(name, (e) => e.preventDefault());
        });

        zone.addEventListener('dragover', () => zone.classList.add('active'));
        zone.addEventListener('dragleave', () => zone.classList.remove('active'));

        zone.addEventListener('drop', async (e) => {
            zone.classList.remove('active');
            const files = Array.from(e.dataTransfer.files);
            
            if (files.length === 0) return;
            status.innerText = `CRUSHING ${files.length} FILE(S)...`;

            for (const file of files) {
                const arrayBuffer = await file.arrayBuffer();
                const data = new Uint8Array(arrayBuffer);

                ImageMagick.read(data, (image) => {
                    image.resize(1920, 0); 
                    image.write(MagickFormat.Webp, (outputBytes) => {
                        const blob = new Blob([outputBytes], { type: 'image/webp' });
                        const link = document.createElement('a');
                        link.href = URL.createObjectURL(blob);
                        link.download = `crushed_${file.name.split('.')[0]}.webp`;
                        link.click();
                    });
                });
            }
            status.innerText = "Done!";
            setTimeout(() => status.innerText = "Engine Online", 2000);
        });
    </script>
</body>
</html>
