<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GSM STUDIOS ✦ CRUSHKIT</title>

    <!--
        COI SERVICE WORKER — must be the FIRST script, before anything else.
        On first visit: SW installs but doesn't yet control the page.
        The inline script below checks crossOriginIsolated and forces a reload
        if needed, so the SW can intercept all subsequent fetches.
    -->
    <script src="coi-serviceworker.js"></script>

    <!--
        CRITICAL FIX:
        coi-serviceworker's reload only triggers on 'updatefound' (new SW version).
        It does NOT reload on first install. We must do that ourselves.

        Logic:
          - If SW is supported AND crossOriginIsolated is false:
              → SW might just need to activate. Force a reload once.
              → Use sessionStorage to avoid infinite reload loop.
          - If crossOriginIsolated is still false after reload:
              → Browser doesn't support it (rare) or something else is wrong.
              → We show a warning but still attempt WASM (may work in degraded mode).
    -->
    <script>
        if ('serviceWorker' in navigator && !self.crossOriginIsolated) {
            if (!sessionStorage.getItem('coi-reload-attempted')) {
                sessionStorage.setItem('coi-reload-attempted', '1');
                // Wait for SW to finish installing, then reload
                navigator.serviceWorker.ready.then(() => location.reload());
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Bebas+Neue&display=swap');

        :root {
            --green: #00ff88;
            --red: #ff3c3c;
            --bg: #080808;
            --surface: #0f0f0f;
            --border: #1e1e1e;
            --muted: #444;
            --text: #fff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Subtle grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Branding */
        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.8rem;
            letter-spacing: 10px;
            font-weight: 400;
            color: var(--text);
            margin-bottom: 4px;
        }

        .subtitle {
            color: var(--muted);
            font-size: 0.68rem;
            margin-bottom: 36px;
            letter-spacing: 3px;
        }

        /* COI Warning Banner (shown if crossOriginIsolated fails after reload) */
        #coi-warning {
            display: none;
            background: rgba(255, 60, 60, 0.08);
            border: 1px solid rgba(255, 60, 60, 0.3);
            color: #ff6b6b;
            font-size: 10px;
            letter-spacing: 1px;
            padding: 8px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            max-width: 400px;
            text-align: center;
        }

        /* Progress Container */
        #loader-container {
            width: 320px;
            margin-bottom: 24px;
            text-align: center;
            transition: opacity 1s ease;
        }

        #status-text {
            font-size: 10px;
            color: var(--muted);
            margin-bottom: 8px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: color 0.3s;
        }

        #progress-wrapper {
            width: 100%;
            height: 2px;
            background: var(--border);
            border-radius: 10px;
            overflow: hidden;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: var(--green);
            transition: width 0.3s ease;
            box-shadow: 0 0 12px var(--green);
        }

        /* Drop Zone */
        #drop-zone {
            width: 420px;
            height: 260px;
            border: 1px solid var(--border);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            background: var(--surface);
            opacity: 0.3;
            pointer-events: none;
        }

        #drop-zone.ready {
            opacity: 1;
            pointer-events: auto;
            border-color: #2a2a2a;
        }

        #drop-zone.active {
            border-color: var(--green);
            background: #0c0c0c;
            transform: scale(1.025);
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.06);
        }

        #drop-zone.processing {
            border-color: var(--green);
            opacity: 0.7;
            pointer-events: none;
        }

        #drop-icon {
            font-size: 2rem;
            opacity: 0.3;
            transition: opacity 0.3s;
        }

        #drop-zone.active #drop-icon,
        #drop-zone.ready:hover #drop-icon {
            opacity: 0.7;
        }

        #label {
            font-size: 0.8rem;
            letter-spacing: 3px;
            color: var(--muted);
            text-transform: uppercase;
            transition: color 0.3s;
        }

        #drop-zone.ready #label { color: #666; }
        #drop-zone.active #label { color: var(--green); }

        #sub-label {
            font-size: 9px;
            color: #2a2a2a;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        #drop-zone.ready #sub-label { color: #333; }

        /* Footer note */
        .privacy-note {
            margin-top: 24px;
            font-size: 9px;
            color: #222;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .privacy-note span { color: #333; }
    </style>
</head>
<body>
<div class="wrapper">
    <h1>GSM STUDIOS</h1>
    <div class="subtitle">CRUSHKIT v1.0 ✦ BY WIMBR</div>

    <!-- Shown only if COI couldn't be established after reload attempt -->
    <div id="coi-warning">
        ⚠ ISOLATION MODE UNAVAILABLE — ENGINE MAY RUN SLOWER
    </div>

    <div id="loader-container">
        <div id="status-text">Warming up engines...</div>
        <div id="progress-wrapper"><div id="progress-bar"></div></div>
    </div>

    <div id="drop-zone">
        <div id="drop-icon">⬇</div>
        <span id="label">WAITING FOR ENGINE</span>
        <span id="sub-label">JPG · PNG → JPG Q82 + WEBP Q75</span>
    </div>

    <div class="privacy-note">✦ <span>zero upload</span> · all processing happens in your browser ✦</div>
</div>

<script type="module">
    import { initializeImageMagick, ImageMagick, MagickFormat }
        from './magick-wasm.js';

    const wasmUrl = './magick.wasm';

    const bar     = document.getElementById('progress-bar');
    const status  = document.getElementById('status-text');
    const zone    = document.getElementById('drop-zone');
    const label   = document.getElementById('label');
    const warning = document.getElementById('coi-warning');

    // --- COI status feedback ---
    if (!self.crossOriginIsolated && sessionStorage.getItem('coi-reload-attempted')) {
        warning.style.display = 'block';
        console.warn('[ChrushKit] crossOriginIsolated is false after reload. WASM will attempt anyway.');
    }

    // --- PHASE 1: Stream with real byte progress, return a Uint8Array ---
    // initializeImageMagick accepts a Uint8Array as wasmBinary (Emscripten option).
    // blob: URLs are explicitly rejected by the library (only http/https accepted).
    async function fetchWasmWithProgress(url) {
        status.innerText = 'Downloading engine...';
        bar.style.transition = 'width 0.1s linear';

        const response = await fetch(url);
        if (!response.ok) throw new Error(`Fetch failed: ${response.status}`);

        const contentLength = response.headers.get('Content-Length');
        const total = contentLength ? parseInt(contentLength, 10) : 0;
        const reader = response.body.getReader();
        const chunks = [];
        let received = 0;

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            chunks.push(value);
            received += value.length;
            if (total) {
                bar.style.width = ((received / total) * 80) + '%';
                status.innerText = `Downloading — ${(received/1048576).toFixed(1)} / ${(total/1048576).toFixed(1)} MB`;
            } else {
                status.innerText = `Downloading — ${(received/1048576).toFixed(1)} MB`;
                bar.style.width = '60%';
            }
        }

        // Combine chunks into a single Uint8Array for initializeImageMagick
        const wasmBuffer = new Uint8Array(received);
        let offset = 0;
        for (const chunk of chunks) {
            wasmBuffer.set(chunk, offset);
            offset += chunk.length;
        }
        return wasmBuffer;
    }

    // --- Engine init ---
    try {
        const wasmBuffer = await fetchWasmWithProgress(wasmUrl);

        // Phase 2: compile (no progress API — just hold bar visually)
        status.innerText = 'Compiling engine...';
        bar.style.transition = 'width 2s ease-out';
        bar.style.width = '92%';

        await initializeImageMagick(wasmBuffer);

        bar.style.transition = 'width 0.3s ease';
        bar.style.width = '100%';
        status.innerText = 'Engine Online ✦ Local Processing Active';
        status.style.color = '#00ff88';
        label.innerText = 'DRAG TO CRUSH';
        zone.classList.add('ready');

        setTimeout(() => {
            document.getElementById('loader-container').style.opacity = '0.25';
            status.style.color = '';
        }, 2500);

        sessionStorage.removeItem('coi-reload-attempted');

    } catch (e) {
        bar.style.background = 'var(--red)';
        bar.style.boxShadow = '0 0 12px var(--red)';
        bar.style.width = '100%';
        status.innerText = 'ERROR: ENGINE FAILED TO LOAD';
        status.style.color = 'var(--red)';
        label.innerText = 'SEE CONSOLE';
        console.error('[ChrushKit] Init failed:', e);
    }

    // --- Drag & drop ---
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(n => {
        document.body.addEventListener(n, e => e.preventDefault());
    });

    zone.addEventListener('dragover',  () => zone.classList.add('active'));
    zone.addEventListener('dragleave', () => zone.classList.remove('active'));

    // WebP quality binary search to approximate webp:target-size=300000
    // img.write() in magick-wasm calls its callback synchronously (WASM context)
    function writeWebPTargetSize(img, targetBytes = 300_000) {
        function tryQuality(q) {
            img.quality = q;
            let out = null;
            img.write(MagickFormat.Webp, (bytes) => { out = new Uint8Array(bytes); });
            return out;
        }
        // Binary search: highest quality where output size <= targetBytes (max q=75)
        let lo = 1, hi = 75, best = null;
        while (lo <= hi) {
            const mid = Math.floor((lo + hi) / 2);
            const candidate = tryQuality(mid);
            if (candidate.byteLength <= targetBytes) {
                best = candidate;
                lo = mid + 1; // fits — try higher quality
            } else {
                hi = mid - 1; // too big — go lower
            }
        }
        return best ?? tryQuality(1); // fallback: quality 1 if even that is too large
    }

    // Recursively collect all image Files from a dropped FileSystemEntry
    async function collectFiles(entry) {
        if (entry.isFile) {
            return new Promise(resolve => entry.file(f => {
                resolve(f.type.startsWith('image/') ? [f] : []);
            }));
        }
        if (entry.isDirectory) {
            const reader = entry.createReader();
            const allEntries = [];
            // readEntries may return batches; keep reading until empty
            await new Promise(resolve => {
                function readBatch() {
                    reader.readEntries(batch => {
                        if (!batch.length) return resolve();
                        allEntries.push(...batch);
                        readBatch();
                    });
                }
                readBatch();
            });
            const nested = await Promise.all(allEntries.map(collectFiles));
            return nested.flat();
        }
        return [];
    }

    zone.addEventListener('drop', async (e) => {
        zone.classList.remove('active');

        const items = Array.from(e.dataTransfer.items);
        const entries = items.map(i => i.webkitGetAsEntry()).filter(Boolean);
        const files = (await Promise.all(entries.map(collectFiles))).flat();

        if (!files.length) return;

        zone.classList.add('processing');
        status.style.color = '#00ff88';

        let done = 0;
        for (const file of files) {
            status.innerText = `CRUSHING ${done + 1} / ${files.length} — ${file.name}`;
            bar.style.width = '0%';

            const data = new Uint8Array(await file.arrayBuffer());

            await new Promise((resolve) => {
                ImageMagick.read(data, (img) => {
                    // Fit within 1920×1920 box, only shrink (matches old -thumbnail "1920x1920>")
                    if (img.width > 1920 || img.height > 1920) {
                        const scale = Math.min(1920 / img.width, 1920 / img.height);
                        img.resize(Math.round(img.width * scale), Math.round(img.height * scale));
                    }

                    const baseName = file.name.replace(/\.[^.]+$/, '');

                    function download(bytes, filename, mime) {
                        const blob = new Blob([bytes], { type: mime });
                        const a = document.createElement('a');
                        a.href = URL.createObjectURL(blob);
                        a.download = filename;
                        document.body.appendChild(a);
                        a.click();
                        setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 1000);
                    }

                    // JPG — quality 82 (matches old crushkit_jpg output)
                    img.quality = 82;
                    img.write(MagickFormat.Jpg, (jpgOut) => {
                        download(jpgOut, `${baseName}.jpg`, 'image/jpeg');

                        // WebP — binary search quality to hit ~300KB target
                        const webpOut = writeWebPTargetSize(img, 300_000);
                        download(webpOut, `${baseName}.webp`, 'image/webp');
                        resolve();
                    });
                });
            });

            done++;
            bar.style.width = (done / files.length * 100) + '%';
        }

        zone.classList.remove('processing');
        status.innerText = `✦ ${done} FILE${done !== 1 ? 'S' : ''} CRUSHED — JPG + WEBP`;
        setTimeout(() => {
            status.innerText = 'Engine Online ✦ Local Processing Active';
            status.style.color = '#00ff88';
            bar.style.width = '100%';
        }, 3000);
    });
</script>
</body>
</html>
