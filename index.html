<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GSM STUDIOS ✦ CRUSHKIT</title>
    <script src="coi-serviceworker.js"></script>
    <style>
        body { background: #080808; color: #fff; font-family: 'Inter', 'Helvetica', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        
        /* Branding */
        h1 { letter-spacing: 4px; font-weight: 200; margin-bottom: 5px; color: #fff; }
        .subtitle { color: #555; font-size: 0.8rem; margin-bottom: 30px; letter-spacing: 1px; }

        /* Progress Container */
        #loader-container { width: 300px; margin-bottom: 20px; text-align: center; }
        #progress-wrapper { width: 100%; height: 4px; background: #222; border-radius: 10px; overflow: hidden; margin-top: 10px; }
        #progress-bar { width: 0%; height: 100%; background: #00ff88; transition: width 0.3s ease; box-shadow: 0 0 10px #00ff88; }

        /* Drop Zone */
        #drop-zone { 
            width: 400px; height: 250px; border: 1px solid #222; border-radius: 20px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; background: #0f0f0f;
            opacity: 0.3; pointer-events: none; /* Disabled until loaded */
        }
        #drop-zone.ready { opacity: 1; pointer-events: auto; border-color: #333; }
        #drop-zone.active { border-color: #00ff88; background: #121212; transform: scale(1.03); }
        
        #label { font-size: 1rem; letter-spacing: 1px; color: #888; }
        #status-text { font-size: 11px; color: #444; margin-top: 8px; text-transform: uppercase; }
    </style>
</head>
<body>
    <h1>GSM STUDIOS</h1>
    <div class="subtitle">CRUSHKIT v1.0 ✦ BY WIMBR</div>

    <div id="loader-container">
        <div id="status-text">Warming up engines...</div>
        <div id="progress-wrapper"><div id="progress-bar"></div></div>
    </div>

    <div id="drop-zone">
        <span id="label">WAITING FOR ENGINE</span>
    </div>

    <script type="module">
        import { initializeImageMagick, ImageMagick, MagickFormat } from 'https://cdn.jsdelivr.net/npm/@imagemagick/magick-wasm@0.0.38/dist/index.mjs';
        const wasmUrl = 'https://cdn.jsdelivr.net/npm/@imagemagick/magick-wasm@0.0.38/dist/magick.wasm';

        const bar = document.getElementById('progress-bar');
        const status = document.getElementById('status-text');
        const zone = document.getElementById('drop-zone');
        const label = document.getElementById('label');

        // Fake progress to show user something is happening
        let progress = 0;
        const interval = setInterval(() => {
            if (progress < 90) {
                progress += Math.random() * 5;
                bar.style.width = progress + '%';
            }
        }, 200);

        try {
            await initializeImageMagick(wasmUrl);
            
            // Success!
            clearInterval(interval);
            bar.style.width = '100%';
            status.innerText = "Engine Online ✦ Local Processing Active";
            label.innerText = "DRAG TO CRUSH";
            zone.classList.add('ready');
            
            // Hide bar after 2 seconds
            setTimeout(() => {
                document.getElementById('loader-container').style.opacity = '0.5';
            }, 2000);

        } catch (e) {
            status.innerText = "ERROR: WASM BLOCKED";
            bar.style.background = "red";
            console.error(e);
        }

        // Global drag/drop prevention
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(n => {
            document.body.addEventListener(n, e => e.preventDefault());
        });

        zone.addEventListener('dragover', () => zone.classList.add('active'));
        zone.addEventListener('dragleave', () => zone.classList.remove('active'));

        zone.addEventListener('drop', async (e) => {
            zone.classList.remove('active');
            const files = Array.from(e.dataTransfer.files);
            if (!files.length) return;

            status.innerText = `CRUSHING ${files.length} FILE(S)...`;
            status.style.color = "#00ff88";

            for (const file of files) {
